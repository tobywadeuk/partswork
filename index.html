<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Parts Work</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌀</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f0e8;
    --paper: #fdfaf4;
    --ink: #1a1410;
    --ink-muted: #6b5e4e;
    --ink-faint: #b8a898;
    --rule: #e0d8cc;
    --radius: 14px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'Lora', Georgia, serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* ── Setup Screen ── */
  #setup {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    width: 100%;
    max-width: 420px;
    padding: 48px 40px 40px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  .setup-header h1 {
    font-family: 'Lora', serif;
    font-size: 26px;
    font-weight: 400;
    color: var(--ink);
    letter-spacing: -0.5px;
    line-height: 1.3;
  }

  .setup-header p {
    margin-top: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--ink-muted);
    letter-spacing: 0.02em;
  }

  .name-fields {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .name-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .person-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .name-row input {
    flex: 1;
    border: none;
    border-bottom: 1px solid var(--rule);
    background: transparent;
    font-family: 'Lora', serif;
    font-size: 15px;
    color: var(--ink);
    padding: 8px 2px;
    outline: none;
    transition: border-color 0.2s;
  }

  .name-row input:focus { border-bottom-color: var(--ink-muted); }
  .name-row input::placeholder { color: var(--ink-faint); font-style: italic; }

  .remove-field-btn {
    background: none;
    border: none;
    color: var(--ink-faint);
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    padding: 2px 4px;
    transition: color 0.15s;
    flex-shrink: 0;
  }

  .remove-field-btn:hover { color: var(--ink-muted); }

  .add-field-btn {
    align-self: flex-start;
    background: none;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    color: var(--ink-faint);
    cursor: pointer;
    padding: 2px 0;
    position: relative;
    transition: color 0.2s;
  }

  .add-field-btn::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 0; height: 1px;
    background: var(--ink-muted);
    transition: width 0.2s;
  }

  .add-field-btn:hover { color: var(--ink-muted); }
  .add-field-btn:hover::after { width: 100%; }

  .setup-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .start-btn {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 11px 24px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .start-btn:hover { opacity: 0.82; }

  .load-convo-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    color: var(--ink-faint);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 0;
    transition: color 0.2s;
    position: relative;
  }

  .load-convo-btn::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 0; height: 1px;
    background: var(--ink-muted);
    transition: width 0.2s;
  }

  .load-convo-btn:hover { color: var(--ink-muted); }
  .load-convo-btn:hover::after { width: 100%; }

  /* ── Chat App ── */
  #app {
    display: none;
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    width: 100%;
    max-width: 560px;
    height: min(720px, 92vh);
    flex-direction: column;
    overflow: hidden;
  }

  .app-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-people {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .header-person {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink-muted);
    letter-spacing: 0.04em;
  }

  .header-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
  }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink-faint);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    letter-spacing: 0.04em;
    transition: color 0.2s;
  }

  .header-btn:hover { color: var(--ink-muted); }

  /* Prompt bar */
  #prompt-bar {
    padding: 10px 18px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--paper);
    min-height: 44px;
  }

  #prompt-text {
    flex: 1;
    font-family: 'Lora', serif;
    font-size: 13px;
    font-style: italic;
    color: var(--ink-muted);
    line-height: 1.4;
    transition: opacity 0.35s ease;
    opacity: 0;
  }

  #prompt-text.visible { opacity: 1; }

  #prompt-text.placeholder {
    color: var(--ink-faint);
    font-size: 12px;
    opacity: 1;
  }

  #prompt-btn {
    flex-shrink: 0;
    background: none;
    border: 1px solid var(--rule);
    border-radius: var(--radius-sm);
    color: var(--ink-muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  #prompt-btn:hover { border-color: var(--ink-muted); color: var(--ink); }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 2px; }

  .empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Lora', serif;
    font-size: 14px;
    font-style: italic;
    color: var(--ink-faint);
  }

  .msg-wrap {
    display: flex;
    flex-direction: column;
    max-width: 72%;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-wrap.left  { align-self: flex-start; }
  .msg-wrap.mid   { align-self: center; }
  .msg-wrap.right { align-self: flex-end; }

  .msg-name {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.06em;
    margin-bottom: 4px;
    padding: 0 4px;
  }

  .msg-wrap.right .msg-name { text-align: right; }
  .msg-wrap.mid   .msg-name { text-align: center; }

  .msg-bubble {
    font-family: 'Lora', serif;
    font-size: 14px;
    line-height: 1.6;
    color: var(--ink);
    padding: 10px 14px;
    border-radius: 12px;
    word-break: break-word;
  }

  /* bubble corner tails set via position class — background set inline */
  .msg-wrap.left  .msg-bubble { border-bottom-left-radius: 3px; }
  .msg-wrap.right .msg-bubble { border-bottom-right-radius: 3px; }

  /* Bottom */
  .bottom {
    border-top: 1px solid var(--rule);
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .speaker-row {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 2px;
    align-items: center;
  }

  .speaker-row::-webkit-scrollbar { display: none; }

  .speaker-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--rule);
    background: transparent;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--ink-muted);
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }

  .speaker-btn .s-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
  }

  .speaker-btn.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  .msg-wrap { cursor: grab; }
  .msg-wrap:active { cursor: grabbing; }

  .speaker-add-btn {
    color: var(--ink-faint);
    padding: 6px 10px;
    font-size: 16px;
    line-height: 1;
  }

  .speaker-add-btn:hover { color: var(--ink-muted); border-color: var(--ink-faint); }

  .speaker-new-input {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--ink-muted);
    background: transparent;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--ink);
    outline: none;
    width: 130px;
    flex-shrink: 0;
  }

  .speaker-new-input::placeholder { color: var(--ink-faint); font-style: italic; }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .msg-input {
    flex: 1;
    font-family: 'Lora', serif;
    font-size: 14px;
    color: var(--ink);
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 20px;
    padding: 9px 16px;
    outline: none;
    transition: border-color 0.2s;
    min-width: 0;
  }

  .msg-input:focus { border-color: var(--ink-muted); }
  .msg-input::placeholder { color: var(--ink-faint); font-style: italic; }

  .send-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--rule);
    background: var(--ink);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }

  .send-btn:hover { opacity: 0.8; }

  .send-btn svg {
    width: 14px;
    height: 14px;
    fill: none;
    stroke: var(--paper);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* Responsive */
  @media (max-width: 480px) {
    body { padding: 0; align-items: flex-end; }
    #setup { border-radius: var(--radius) var(--radius) 0 0; padding: 36px 24px 32px; max-width: 100%; }
    #app { border-radius: var(--radius) var(--radius) 0 0; height: 96vh; max-width: 100%; }
    .msg-wrap { max-width: 82%; }
  }
</style>
</head>
<body>

<!-- Setup Screen -->
<div id="setup">
  <div class="setup-header">
    <h1>Start a dialogue</h1>
    <p id="setup-subtitle">Name the voices in this conversation</p>
  </div>
  <div class="name-fields" id="name-fields"></div>
  <div class="setup-actions">
    <button class="start-btn" onclick="startChat()">Begin →</button>
    <button class="load-convo-btn" id="load-convo-btn">load conversation</button>
  </div>
  <input type="file" id="load-convo-file" accept=".txt" hidden />
</div>

<!-- Chat App -->
<div id="app">
  <div class="app-header">
    <div class="header-people" id="header-people"></div>
    <div class="header-controls">
      <button class="header-btn" id="save-btn">save</button>
      <button class="header-btn" onclick="resetAll()">reset</button>
    </div>
  </div>

  <div id="prompt-bar">
    <div id="prompt-text" class="placeholder">press prompt for a question</div>
    <button id="prompt-btn">Prompt</button>
  </div>

  <div class="messages" id="messages">
    <div class="empty" id="empty-msg">The conversation begins here.</div>
  </div>

  <div class="bottom">
    <div class="speaker-row" id="speaker-row"></div>
    <div class="input-row">
      <input class="msg-input" id="msg-input" type="text" placeholder="Write something…" autocomplete="off" />
      <button class="send-btn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
  const MAX_PEOPLE = 6;

  const PALETTE = [
    { dot: '#7a6e62', bg: '#e8e0d4' },
    { dot: '#5a7a68', bg: '#dde8e0' },
    { dot: '#5a6880', bg: '#dde0e8' },
    { dot: '#7a5a6a', bg: '#e8dde2' },
    { dot: '#72725a', bg: '#e6e6da' },
    { dot: '#5a7878', bg: '#dde6e6' },
  ];

  // Positions: first two people get left/right (most natural for dialogue),
  // further people cycle through all three.
  const POSITIONS = ['left', 'right', 'mid'];

  function palette(idx) { return PALETTE[idx % PALETTE.length]; }
  function position(idx) { return POSITIONS[idx % POSITIONS.length]; }

  const placeholderTerm = Math.random() < 0.5 ? 'Part' : 'Ego state';

  let names = [];
  let active = 0;
  let messages = [];
  let dragging = null;
  const DRAG_THRESHOLD = 72;

  // ── Setup: dynamic name fields ──
  let setupCount = 2;

  function renderNameFields() {
    const container = document.getElementById('name-fields');
    // Preserve any values already typed before wiping the DOM
    const saved = Array.from(container.querySelectorAll('input')).map(el => el.value);
    container.innerHTML = '';

    for (let i = 0; i < setupCount; i++) {
      const row = document.createElement('div');
      row.className = 'name-row';

      const dot = document.createElement('div');
      dot.className = 'person-dot';
      dot.style.background = palette(i).dot;

      const input = document.createElement('input');
      input.type = 'text';
      input.dataset.idx = i;
      input.placeholder = `${placeholderTerm} ${i + 1}`;
      input.maxLength = 28;
      input.autocomplete = 'off';
      if (saved[i]) input.value = saved[i];
      input.addEventListener('keydown', handleSetupKey);

      row.appendChild(dot);
      row.appendChild(input);

      if (setupCount > 1) {
        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove-field-btn';
        removeBtn.textContent = '×';
        removeBtn.title = 'Remove person';
        removeBtn.addEventListener('click', () => {
          setupCount--;
          renderNameFields();
        });
        row.appendChild(removeBtn);
      }

      container.appendChild(row);
    }

    if (setupCount < MAX_PEOPLE) {
      const addBtn = document.createElement('button');
      addBtn.className = 'add-field-btn';
      addBtn.textContent = `+ add ${placeholderTerm.toLowerCase()}`;
      addBtn.addEventListener('click', () => {
        setupCount++;
        renderNameFields();
        // Focus the new field
        const inputs = document.querySelectorAll('#name-fields input');
        inputs[inputs.length - 1].focus();
      });
      container.appendChild(addBtn);
    }
  }

  function handleSetupKey(e) {
    const inputs = Array.from(document.querySelectorAll('#name-fields input'));
    const i = inputs.indexOf(e.target);
    if (e.key === 'Enter') {
      if (i < inputs.length - 1) inputs[i + 1].focus();
      else startChat();
    }
  }

  renderNameFields();

  // ── Prompts ──
  const prompts = [
    "What if everything you think you know about this is wrong?",
    "What would it feel like to have no idea what this actually is?",
    "What part of this are you most resistant to being curious about?",
    "What would change if you approached this like you'd never seen it before?",
    "What is the positive quality hiding inside this thing you dislike about yourself?",
    "What does this part of you actually want for you, underneath all of it?",
    "What is this pattern protecting you from?",
    "What exact words, sensations, or images are actually here right now?",
    "What are you actually feeling versus what are you telling yourself you're feeling?",
    "What is this trying to become?",
    "Where is this naturally wanting to go if you stop controlling it?",
    "What is the next small movement this wants to make?",
    "Where are you placing yourself in relation to this — above, below, or alongside?",
    "What would it feel like to be on the same level as this?",
    "What would change if you stopped trying to fix this and just walked beside it?",
  ];

  let lastPromptIdx = -1;

  document.getElementById('prompt-btn').addEventListener('click', () => {
    let idx;
    do { idx = Math.floor(Math.random() * prompts.length); } while (idx === lastPromptIdx && prompts.length > 1);
    lastPromptIdx = idx;

    const el = document.getElementById('prompt-text');
    el.classList.remove('visible', 'placeholder');
    void el.offsetWidth;
    el.textContent = prompts[idx];
    el.classList.add('visible');
  });

  // ── Load conversation ──
  function loadConversationFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const lines = ev.target.result.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
      const nameOrder = [];
      const parsed = [];

      for (const line of lines) {
        const m = line.match(/^(.+?):\s+(.+)$/);
        if (!m) continue;
        const [, name, text] = m;
        if (!nameOrder.includes(name) && nameOrder.length < MAX_PEOPLE) nameOrder.push(name);
        if (nameOrder.includes(name)) {
          parsed.push({ person: nameOrder.indexOf(name), text });
        }
      }

      if (parsed.length === 0) return;

      setupCount = nameOrder.length;
      renderNameFields();

      const inputs = document.querySelectorAll('#name-fields input');
      nameOrder.forEach((name, i) => { if (inputs[i]) inputs[i].value = name; });

      startChat(parsed);
    };
    reader.readAsText(file);
  }

  document.getElementById('load-convo-btn').addEventListener('click', () => {
    document.getElementById('load-convo-file').click();
  });

  document.getElementById('load-convo-file').addEventListener('change', e => {
    loadConversationFile(e.target.files[0]);
    e.target.value = '';
  });

  const setupEl = document.getElementById('setup');
  setupEl.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
    setupEl.style.borderColor = 'var(--ink-faint)';
  });
  setupEl.addEventListener('dragleave', () => {
    setupEl.style.borderColor = '';
  });
  setupEl.addEventListener('drop', e => {
    e.preventDefault();
    setupEl.style.borderColor = '';
    const file = Array.from(e.dataTransfer.files).find(f => f.name.endsWith('.txt'));
    if (file) loadConversationFile(file);
  });

  // ── Save conversation ──
  document.getElementById('save-btn').addEventListener('click', () => {
    const lines = messages.map(m => `${names[m.person]}: ${m.text}`).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([lines], { type: 'text/plain' }));
    const joined = names.length === 1 ? names[0]
      : names.slice(0, -1).join(', ') + ' and ' + names[names.length - 1];
    a.download = `dialogue between ${joined}.txt`;
    a.click();
  });

  // ── Start chat ──
  document.getElementById('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMsg();
  });

  function startChat(loadedMessages) {
    const inputs = document.querySelectorAll('#name-fields input');
    names = Array.from(inputs).map((el, i) => el.value.trim() || `${placeholderTerm} ${i + 1}`);
    messages = [];

    document.getElementById('setup').style.display = 'none';
    document.getElementById('app').style.display = 'flex';

    buildHeader();
    buildSpeakerRow();
    setActive(0);

    if (loadedMessages && loadedMessages.length > 0) {
      const empty = document.getElementById('empty-msg');
      if (empty) empty.remove();
      for (const m of loadedMessages) appendMessage(m.person, m.text, false);
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }

    document.getElementById('msg-input').focus();
  }

  function buildHeader() {
    document.getElementById('header-people').innerHTML = names.map((n, i) => `
      <div class="header-person">
        <div class="header-dot" style="background:${palette(i).dot};"></div>
        ${escHtml(n)}
      </div>`).join('');
  }

  function buildSpeakerRow() {
    const row = document.getElementById('speaker-row');
    row.innerHTML = '';

    names.forEach((n, i) => {
      const btn = document.createElement('button');
      btn.className = 'speaker-btn' + (i === active ? ' active' : '');
      btn.id = `tab-${i}`;
      btn.innerHTML = `<span class="s-dot" style="background:${palette(i).dot};"></span>${escHtml(n)}`;
      btn.addEventListener('click', () => setActive(i));
      row.appendChild(btn);
    });

    if (names.length < MAX_PEOPLE) {
      const addBtn = document.createElement('button');
      addBtn.className = 'speaker-btn speaker-add-btn';
      addBtn.textContent = '+';
      addBtn.title = `Add a ${placeholderTerm.toLowerCase()}`;
      addBtn.addEventListener('click', showAddSpeakerInput);
      row.appendChild(addBtn);
    }
  }

  function showAddSpeakerInput() {
    const row = document.getElementById('speaker-row');
    // Remove the + button
    const addBtn = row.querySelector('.speaker-add-btn');
    if (addBtn) addBtn.remove();

    const input = document.createElement('input');
    input.className = 'speaker-new-input';
    input.placeholder = 'name…';
    input.maxLength = 28;
    input.autocomplete = 'off';

    let done = false;

    function confirm() {
      if (done) return;
      done = true;
      const name = input.value.trim();
      input.remove();
      if (name) {
        names.push(name);
        buildHeader();
        buildSpeakerRow();
        setActive(names.length - 1);
      } else {
        buildSpeakerRow();
      }
    }

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') confirm();
      if (e.key === 'Escape') { done = true; input.remove(); buildSpeakerRow(); }
    });

    input.addEventListener('blur', () => setTimeout(confirm, 100));

    row.appendChild(input);
    input.focus();
  }

  function setActive(idx) {
    active = idx;
    document.querySelectorAll('.speaker-btn').forEach((b, i) => {
      b.classList.toggle('active', i === idx);
    });
    const input = document.getElementById('msg-input');
    input.placeholder = `Speaking as ${names[idx]}…`;
    input.focus();
  }

  function appendMessage(personIdx, text, animate = true) {
    messages.push({ person: personIdx, text });

    const pos = position(personIdx);
    const col = palette(personIdx);

    const msgIdx = messages.length - 1;

    const wrap = document.createElement('div');
    wrap.className = `msg-wrap ${pos}`;
    wrap.dataset.msgIdx = msgIdx;
    if (!animate) wrap.style.animation = 'none';

    wrap.addEventListener('pointerdown', startDrag);

    const nameEl = document.createElement('div');
    nameEl.className = 'msg-name';
    nameEl.textContent = names[personIdx];

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.style.background = col.bg;
    bubble.textContent = text;

    wrap.appendChild(nameEl);
    wrap.appendChild(bubble);
    document.getElementById('messages').appendChild(wrap);
  }

  function sendMsg() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';

    const empty = document.getElementById('empty-msg');
    if (empty) empty.remove();

    appendMessage(active, text);

    const msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
    input.focus();
  }

  function resetAll() {
    if (!confirm('Clear the conversation and start over?')) return;
    messages = [];
    names = [];
    active = 0;
    setupCount = 2;

    document.getElementById('app').style.display = 'none';
    document.getElementById('messages').innerHTML = '<div class="empty" id="empty-msg">The conversation begins here.</div>';
    document.getElementById('header-people').innerHTML = '';

    const promptEl = document.getElementById('prompt-text');
    promptEl.textContent = 'press prompt for a question';
    promptEl.className = 'placeholder';
    lastPromptIdx = -1;

    renderNameFields();
    document.getElementById('setup').style.display = 'flex';
    document.querySelector('#name-fields input').focus();
  }

  document.addEventListener('keydown', e => {
    if (!e.metaKey) return;
    const n = parseInt(e.key, 10);
    if (n >= 1 && n <= names.length && document.getElementById('app').style.display !== 'none') {
      e.preventDefault();
      setActive(n - 1);
    }
  });

  function startDrag(e) {
    if (e.button !== 0) return;
    e.preventDefault();
    const wrap = e.currentTarget;
    const msgIdx = parseInt(wrap.dataset.msgIdx, 10);
    const bubble = wrap.querySelector('.msg-bubble');
    const rect = bubble.getBoundingClientRect();
    const origBg = bubble.style.background;

    const ghost = document.createElement('div');
    ghost.className = 'msg-bubble';
    ghost.textContent = messages[msgIdx].text;
    Object.assign(ghost.style, {
      position: 'fixed',
      left: rect.left + 'px',
      top: rect.top + 'px',
      width: rect.width + 'px',
      margin: '0',
      background: origBg,
      pointerEvents: 'none',
      zIndex: '1000',
      boxShadow: '0 10px 36px rgba(0,0,0,0.10)',
      transition: 'background 0.28s ease',
      willChange: 'transform',
    });
    document.body.appendChild(ghost);

    wrap.style.transition = 'opacity 0.15s ease';
    wrap.style.opacity = '0.15';

    dragging = { wrap, ghost, msgIdx, origBg, startX: e.clientX, startY: e.clientY, pendingTarget: null };
    document.addEventListener('pointermove', onDragMove);
    document.addEventListener('pointerup', onDragEnd);
    document.addEventListener('pointercancel', onDragEnd);
  }

  function onDragMove(e) {
    if (!dragging) return;
    const dx = e.clientX - dragging.startX;
    const dy = e.clientY - dragging.startY;
    dragging.ghost.style.transform = `translate(${dx}px, ${dy}px)`;

    if (Math.abs(dx) >= DRAG_THRESHOLD && names.length >= 2) {
      const targetIdx = dx < 0 ? 0 : 1;
      if (dragging.pendingTarget !== targetIdx) {
        dragging.pendingTarget = targetIdx;
        dragging.ghost.style.background = palette(targetIdx).bg;
      }
    } else if (dragging.pendingTarget !== null) {
      dragging.pendingTarget = null;
      dragging.ghost.style.background = dragging.origBg;
    }
  }

  function onDragEnd(e) {
    if (!dragging) return;
    document.removeEventListener('pointermove', onDragMove);
    document.removeEventListener('pointerup', onDragEnd);
    document.removeEventListener('pointercancel', onDragEnd);

    const { wrap, ghost, msgIdx } = dragging;
    const dx = (e.clientX ?? dragging.startX) - dragging.startX;

    if (e.type !== 'pointercancel' && Math.abs(dx) >= DRAG_THRESHOLD && names.length >= 2) {
      reassignMessage(msgIdx, dx < 0 ? 0 : 1);
    }

    ghost.style.transition = 'opacity 0.18s ease, transform 0.18s ease';
    ghost.style.opacity = '0';
    ghost.style.transform = (ghost.style.transform || '') + ' scale(0.96)';
    setTimeout(() => ghost.remove(), 200);

    wrap.style.opacity = '';
    setTimeout(() => { wrap.style.transition = ''; }, 200);

    dragging = null;
  }

  function reassignMessage(msgIdx, personIdx) {
    messages[msgIdx].person = personIdx;
    const wrap = document.querySelector(`[data-msg-idx="${msgIdx}"]`);
    if (!wrap) return;
    const bubble = wrap.querySelector('.msg-bubble');
    bubble.style.transition = 'background 0.32s ease';
    bubble.style.background = palette(personIdx).bg;
    setTimeout(() => { bubble.style.transition = ''; }, 340);
    wrap.querySelector('.msg-name').textContent = names[personIdx];
    wrap.className = `msg-wrap ${position(personIdx)}`;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
